<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tray Usage Projector • UK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .period-label { font-feature-settings: "tnum"; }
        html { transition: background-color 0.3s ease, color 0.3s ease; }
        
        @media (min-width: 1024px) {
            .desktop-optimized { padding-left: 3rem; padding-right: 3rem; }
            .input-large { height: 3.75rem; font-size: 1.35rem; }
            .table-row { height: 3.25rem; }
        }
    </style>

    <script>
        // Force dark mode only (no light option)
        document.documentElement.classList.add('dark');
    </script>
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 transition-colors duration-300">
    <div class="max-w-7xl mx-auto p-6 lg:p-10 desktop-optimized">
        <!-- Header -->
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-6 mb-10">
            <div>
                <h1 class="text-4xl lg:text-5xl font-bold tracking-tight text-emerald-700 dark:text-emerald-400">Tray Usage Projector</h1>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12">
            <!-- Rates -->
            <div class="lg:col-span-5 bg-white dark:bg-zinc-900 rounded-3xl shadow-sm border border-zinc-100 dark:border-zinc-700 p-8 lg:p-10">
                <h2 class="text-xl lg:text-2xl font-semibold mb-8 flex items-center gap-3">
                    <i class="fa-solid fa-percent text-emerald-600 dark:text-emerald-400"></i>
                    Trays per £1,000 Sales
                </h2>
                <div class="space-y-6">
                    <div class="flex items-center gap-6">
                        <div class="w-20 text-right font-medium text-zinc-500 dark:text-zinc-400 text-lg">13"</div>
                        <input id="rate13" type="number" step="0.01" min="0" class="w-36 h-16 lg:h-20 text-3xl font-semibold text-center bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 focus:border-emerald-500 dark:focus:border-emerald-400 rounded-3xl outline-none text-zinc-900 dark:text-zinc-100 input-large">
                        <div class="text-sm lg:text-base text-zinc-400 dark:text-zinc-500 w-12">trays</div>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="w-20 text-right font-medium text-zinc-500 dark:text-zinc-400 text-lg">11"</div>
                        <input id="rate11" type="number" step="0.01" min="0" class="w-36 h-16 lg:h-20 text-3xl font-semibold text-center bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 focus:border-emerald-500 dark:focus:border-emerald-400 rounded-3xl outline-none text-zinc-900 dark:text-zinc-100 input-large">
                        <div class="text-sm lg:text-base text-zinc-400 dark:text-zinc-500 w-12">trays</div>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="w-20 text-right font-medium text-zinc-500 dark:text-zinc-400 text-lg">9"</div>
                        <input id="rate9" type="number" step="0.01" min="0" class="w-36 h-16 lg:h-20 text-3xl font-semibold text-center bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 focus:border-emerald-500 dark:focus:border-emerald-400 rounded-3xl outline-none text-zinc-900 dark:text-zinc-100 input-large">
                        <div class="text-sm lg:text-base text-zinc-400 dark:text-zinc-500 w-12">trays</div>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="w-20 text-right font-medium text-zinc-500 dark:text-zinc-400 text-lg">6"</div>
                        <input id="rate6" type="number" step="0.01" min="0" class="w-36 h-16 lg:h-20 text-3xl font-semibold text-center bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 focus:border-emerald-500 dark:focus:border-emerald-400 rounded-3xl outline-none text-zinc-900 dark:text-zinc-100 input-large">
                        <div class="text-sm lg:text-base text-zinc-400 dark:text-zinc-500 w-12">trays</div>
                    </div>
                </div>
            </div>

            <!-- Sales -->
            <div class="lg:col-span-7 bg-white dark:bg-zinc-900 rounded-3xl shadow-sm border border-zinc-100 dark:border-zinc-700 p-8 lg:p-10">
                <h2 class="text-xl lg:text-2xl font-semibold mb-8 flex items-center gap-3">
                    <i class="fa-solid fa-clock text-emerald-600 dark:text-emerald-400"></i>
                    Sales by Service Period (£)
                </h2>
                <div id="salesInputs" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Populated by JS -->
                </div>
                <!-- Clear Sales button moved here – full width at bottom of this section -->
                <button onclick="clearSales()" class="mt-8 w-full px-6 py-3.5 bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-700 hover:border-red-500 text-red-600 dark:text-red-400 rounded-3xl flex items-center justify-center gap-2 text-sm font-medium transition active:bg-red-50 dark:active:bg-zinc-800">
                    <i class="fa-solid fa-trash"></i> Clear Sales
                </button>
            </div>
        </div>

        <!-- Results -->
        <div class="mt-12 bg-white dark:bg-zinc-900 rounded-3xl shadow-sm border border-zinc-100 dark:border-zinc-700 overflow-hidden">
            <div class="px-8 lg:px-12 pt-8 pb-5 border-b border-zinc-100 dark:border-zinc-700 flex items-center justify-between bg-zinc-50 dark:bg-zinc-800">
                <h2 class="text-2xl lg:text-3xl font-semibold">Projected Tray Usage</h2>
                <div id="totalSales" class="text-right">
                    <div class="text-xs text-zinc-500 dark:text-zinc-400 tracking-widest">TOTAL SALES</div>
                    <div class="text-3xl lg:text-4xl font-semibold text-emerald-700 dark:text-emerald-400">£0</div>
                </div>
            </div>

            <div id="mobileCards" class="md:hidden p-6 space-y-6"></div>

            <div class="hidden md:block overflow-x-auto">
                <table id="resultsTable" class="w-full text-sm lg:text-base">
                    <thead>
                        <tr class="bg-zinc-50 dark:bg-zinc-800 border-b border-zinc-100 dark:border-zinc-700">
                            <th class="py-6 px-8 text-left font-medium text-zinc-500 dark:text-zinc-400">Period</th>
                            <th class="py-6 px-6 text-right font-medium text-zinc-500 dark:text-zinc-400">Sales (£)</th>
                            <th class="py-6 px-6 text-center font-medium text-zinc-500 dark:text-zinc-400">13"</th>
                            <th class="py-6 px-6 text-center font-medium text-zinc-500 dark:text-zinc-400">11"</th>
                            <th class="py-6 px-6 text-center font-medium text-zinc-500 dark:text-zinc-400">9"</th>
                            <th class="py-6 px-6 text-center font-medium text-zinc-500 dark:text-zinc-400">6"</th>
                            <th class="py-6 px-8 text-right font-medium text-zinc-500 dark:text-zinc-400">Total Trays</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-zinc-100 dark:divide-zinc-700 text-base"></tbody>
                </table>
            </div>

            <div class="bg-zinc-50 dark:bg-zinc-800 px-8 lg:px-12 py-8 grid grid-cols-2 md:grid-cols-4 gap-8 border-t border-zinc-100 dark:border-zinc-700">
                <div><div class="text-xs text-zinc-500 dark:text-zinc-400 mb-2 tracking-widest">13" TOTAL</div><div id="total13" class="text-4xl font-semibold text-emerald-700 dark:text-emerald-400">0.0</div></div>
                <div><div class="text-xs text-zinc-500 dark:text-zinc-400 mb-2 tracking-widest">11" TOTAL</div><div id="total11" class="text-4xl font-semibold text-emerald-700 dark:text-emerald-400">0.0</div></div>
                <div><div class="text-xs text-zinc-500 dark:text-zinc-400 mb-2 tracking-widest">9" TOTAL</div><div id="total9" class="text-4xl font-semibold text-emerald-700 dark:text-emerald-400">0.0</div></div>
                <div><div class="text-xs text-zinc-500 dark:text-zinc-400 mb-2 tracking-widest">6" TOTAL</div><div id="total6" class="text-4xl font-semibold text-emerald-700 dark:text-emerald-400">0.0</div></div>
            </div>
        </div>

        <!-- Export PDF button – full width at bottom of page -->
        <div class="mt-12">
            <button onclick="generateProofingPDF()" class="w-full px-6 py-3.5 bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-700 hover:border-emerald-500 text-emerald-600 dark:text-emerald-400 rounded-3xl flex items-center justify-center gap-2 text-sm font-medium transition">
                <i class="fa-solid fa-file-pdf"></i> Export PDF Plan
            </button>
        </div>
    </div>

    <<script>
        const periods = [
            { name: "11:30 – 16:00", pdfLabel: "1130-1600", id: "sales1130", label: "11:30 – 16:00" },
            { name: "16:00 – 18:00", pdfLabel: "1600-1800", id: "sales1600", label: "16:00 – 18:00" },
            { name: "18:00 – 21:00", pdfLabel: "1800-2100", id: "sales1800", label: "18:00 – 21:00" },
            { name: "21:00 – 23:00", pdfLabel: "2100-2300", id: "sales2100", label: "21:00 – 23:00" },
            { name: "23:00 – 01:00", pdfLabel: "2300-0100", id: "sales2300", label: "23:00 – 01:00" },
            { name: "01:00 – 03:00", pdfLabel: "0100-0300", id: "sales0100", label: "01:00 – 03:00" }
        ];

        const rateIds = ["rate13", "rate11", "rate9", "rate6"];

        function saveToLocalStorage() {
            const data = {};
            rateIds.forEach(id => data[id] = document.getElementById(id).value);
            periods.forEach(p => data[p.id] = document.getElementById(p.id).value);
            localStorage.setItem("trayProjectorData", JSON.stringify(data));
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem("trayProjectorData");
            if (!saved) return;
            const data = JSON.parse(saved);
            rateIds.forEach(id => { if (data[id]) document.getElementById(id).value = data[id]; });
            periods.forEach(p => { if (data[p.id]) document.getElementById(p.id).value = data[p.id]; });
        }

        function createSalesInputs() {
            const container = document.getElementById("salesInputs");
            container.innerHTML = "";
            periods.forEach(period => {
                const div = document.createElement("div");
                div.className = "bg-zinc-50 dark:bg-zinc-800 rounded-3xl p-6 border border-transparent focus-within:border-emerald-200 dark:focus-within:border-emerald-700";
                div.innerHTML = `
                    <label class="block text-xs font-medium text-zinc-500 dark:text-zinc-400 mb-2 period-label">${period.label}</label>
                    <div class="relative">
                        <span class="absolute left-6 top-4 text-emerald-600 dark:text-emerald-400 font-medium text-2xl">£</span>
                        <input id="${period.id}" type="number" min="0" step="10"
                               class="w-full h-16 pl-14 pr-6 text-3xl font-semibold bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 focus:border-emerald-500 dark:focus:border-emerald-400 rounded-3xl outline-none text-zinc-900 dark:text-zinc-100">
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function renderMobileCards(data) {
            const container = document.getElementById("mobileCards");
            container.innerHTML = "";
            data.forEach(item => {
                const card = document.createElement("div");
                card.className = "bg-white dark:bg-zinc-900 border border-zinc-100 dark:border-zinc-700 rounded-3xl p-6 shadow-sm";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-5">
                        <div class="font-medium text-lg">${item.name}</div>
                        <div class="text-right">
                            <div class="text-xs text-zinc-500 dark:text-zinc-400">Sales</div>
                            <div class="font-semibold text-emerald-700 dark:text-emerald-400 text-xl">£${item.sales.toLocaleString("en-GB")}</div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-x-10 gap-y-4 text-base">
                        <div class="flex justify-between"><span class="text-zinc-500 dark:text-zinc-400">13"</span><span class="font-medium">${item.t13.toFixed(1)}</span></div>
                        <div class="flex justify-between"><span class="text-zinc-500 dark:text-zinc-400">11"</span><span class="font-medium">${item.t11.toFixed(1)}</span></div>
                        <div class="flex justify-between"><span class="text-zinc-500 dark:text-zinc-400">9"</span><span class="font-medium">${item.t9.toFixed(1)}</span></div>
                        <div class="flex justify-between"><span class="text-zinc-500 dark:text-zinc-400">6"</span><span class="font-medium">${item.t6.toFixed(1)}</span></div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function calculate() {
            saveToLocalStorage();

            const rates = {
                13: parseFloat(document.getElementById("rate13").value) || 0,
                11: parseFloat(document.getElementById("rate11").value) || 0,
                9: parseFloat(document.getElementById("rate9").value) || 0,
                6: parseFloat(document.getElementById("rate6").value) || 0
            };

            let totalSales = 0;
            let totalsExact = {13: 0, 11: 0, 9: 0, 6: 0};
            let mobileData = [];
            let tableHTML = "";

            periods.forEach(period => {
                const sales = parseFloat(document.getElementById(period.id).value) || 0;
                totalSales += sales;

                const t13 = sales / 1000 * rates[13];
                const t11 = sales / 1000 * rates[11];
                const t9  = sales / 1000 * rates[9];
                const t6  = sales / 1000 * rates[6];

                const periodTotalExact = t13 + t11 + t9 + t6;

                totalsExact[13] += t13; totalsExact[11] += t11;
                totalsExact[9]  += t9;  totalsExact[6]  += t6;

                mobileData.push({
                    name: period.name,
                    pdfLabel: period.pdfLabel,
                    sales: sales,
                    t13: t13, t11: t11, t9: t9, t6: t6,
                    total: periodTotalExact
                });

                tableHTML += `
                    <tr class="hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-colors table-row">
                        <td class="py-5 px-8 font-medium whitespace-nowrap">${period.name}</td>
                        <td class="py-5 px-6 text-right font-semibold">£${sales.toLocaleString("en-GB")}</td>
                        <td class="py-5 px-6 text-center font-medium">${t13.toFixed(1)}</td>
                        <td class="py-5 px-6 text-center font-medium">${t11.toFixed(1)}</td>
                        <td class="py-5 px-6 text-center font-medium">${t9.toFixed(1)}</td>
                        <td class="py-5 px-6 text-center font-medium">${t6.toFixed(1)}</td>
                        <td class="py-5 px-8 text-right font-semibold">${periodTotalExact.toFixed(1)}</td>
                    </tr>
                `;
            });

            document.getElementById("tableBody").innerHTML = tableHTML;
            renderMobileCards(mobileData);

            document.getElementById("totalSales").innerHTML = `
                <div class="text-xs text-zinc-500 dark:text-zinc-400 tracking-widest">TOTAL SALES</div>
                <div class="text-3xl lg:text-4xl font-semibold text-emerald-700 dark:text-emerald-400">£${totalSales.toLocaleString("en-GB")}</div>
            `;

            document.getElementById("total13").textContent = totalsExact[13].toFixed(1);
            document.getElementById("total11").textContent = totalsExact[11].toFixed(1);
            document.getElementById("total9").textContent  = totalsExact[9].toFixed(1);
            document.getElementById("total6").textContent  = totalsExact[6].toFixed(1);

            window.lastCalculation = { mobileData, totalSales };
        }

        function clearSales() {
            periods.forEach(p => document.getElementById(p.id).value = "");
            calculate();
        }

        function generateProofingPDF() {
            if (!window.lastCalculation) calculate();

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

            const calc = window.lastCalculation;
            const { mobileData, totalSales } = calc;

            const headerY = 22;
            doc.setFont("helvetica", "bold");
            doc.setFontSize(14);
            doc.text(`FORECAST: ${totalSales.toLocaleString("en-GB")}`, 20, headerY);
            doc.text("PROOFING PLAN", 105, headerY, { align: "center" });

            const today = new Date();
            const dateStr = today.getDate() + "." + (today.getMonth()+1).toString().padStart(2,'0') + "." + today.getFullYear().toString().slice(2);

            doc.setFont("helvetica", "bold");
            doc.setFontSize(14);
            doc.text(`DATE: ${dateStr}`, 165, headerY);

            let maxSizeWidth = 0;
            const gapAfterSize = 14;

            mobileData.forEach(period => {
                const trays = [
                    { size: "13\"", qty: period.t13 },
                    { size: "11\"", qty: period.t11 },
                    { size: "9\"",  qty: period.t9 },
                    { size: "6\"",  qty: period.t6 }
                ];
                trays.forEach(tray => {
                    const w = doc.getTextWidth(tray.size);
                    if (w > maxSizeWidth) maxSizeWidth = w;
                });
            });

            const sizeX = 28;
            const qtyRightX = sizeX + maxSizeWidth + gapAfterSize;
            const trayX = qtyRightX + 10;

            let y = 46;

            mobileData.forEach((period, index) => {
                const headerText = period.pdfLabel + " (" + period.sales.toLocaleString("en-GB") + ")";
                doc.setFontSize(12);
                doc.setFont("helvetica", "bold");
                doc.text(headerText, 20, y);
                y += 7;

                const trays = [
                    { size: "13\"", qty: period.t13 },
                    { size: "11\"", qty: period.t11 },
                    { size: "9\"",  qty: period.t9 },
                    { size: "6\"",  qty: period.t6 }
                ];

                const proofX = 115;

                trays.forEach(tray => {
                    const qtyStr = tray.qty.toFixed(1);

                    // Size label
                    doc.setFont("helvetica", "normal");
                    doc.setFontSize(11);
                    doc.text(tray.size, sizeX, y);

                    const sizeW = doc.getTextWidth(tray.size);
                    const qtyW = doc.getTextWidth(qtyStr);
                    const qtyX = qtyRightX - qtyW;

                    // Quantity – always bold black
                    doc.setTextColor(0, 0, 0);
                    doc.setFont("helvetica", "bold");
                    doc.setFontSize(11);
                    doc.text(qtyStr, qtyX, y);

                    // Reduced thickness underline (0.6) – black
                    doc.setDrawColor(0, 0, 0);
                    doc.setLineWidth(0.6);
                    doc.line(qtyX, y + 1.2, qtyRightX, y + 1.2);

                    // "TRAYS" label
                    doc.setFont("helvetica", "normal");
                    doc.setFontSize(11);
                    doc.text("TRAYS", trayX, y);

                    // Proof fields
                    doc.setFontSize(9);
                    doc.text("PROOF ________ DAY ________ @ ________", proofX, y);
                    doc.setFontSize(11);

                    y += 6.2;
                });

                y += 8;

                if (index < mobileData.length - 1) {
                    doc.setDrawColor(200);
                    doc.line(20, y - 5, 190, y - 5);
                }
            });

            doc.save("Proofing-Plan-" + dateStr.replace(/\./g, '-') + ".pdf");
        }

        window.onload = function() {
            createSalesInputs();
            loadFromLocalStorage();
            document.querySelectorAll("input[type='number']").forEach(input => input.addEventListener("input", calculate));
            calculate();

            // Register PWA service worker
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(() => console.log('✅ Tray Projector PWA ready'))
                    .catch(err => console.log('SW error:', err));
            }
        };
    </script>
